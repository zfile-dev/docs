name: Docker Build Image And Push Docker Registry

on:
  push:
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
  workflow_dispatch:      # 手动触发

permissions:
  contents: read

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Docker Build Image And Push Docker Registry
    runs-on: blacksmith-4vcpu-ubuntu-2204
    env:
      SECRET_REPO_PREFIX: REPO_
      SECRET_USERNAME_PREFIX: USERNAME_
      SECRET_PASSWORD_PREFIX: PASSWORD_
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: useblacksmith/setup-node@v5
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: yarn.lock

      - name: Build front
        run: |
          corepack enable
          yarn && yarn build

      - name: Set up QEMU               # 设置 QEMU 环境，用来模拟操作系统，用来编译 arm64 镜像和 amd64 镜像
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx      # 设置 Docker Buildx 环境
        id: buildx
        uses: docker/setup-buildx-action@v4
        with:
          version: v0.35.0
          driver-opts: |
            image=moby/buildkit:v0.30.0

      - name: Inspect builder           # 查看 builder 状态
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "Name:      ${{ steps.buildx.outputs.name }}"
          echo "Endpoint:  ${{ steps.buildx.outputs.endpoint }}"
          echo "Status:    ${{ steps.buildx.outputs.status }}"
          echo "Flags:     ${{ steps.buildx.outputs.flags }}"
          echo "Platforms: ${{ steps.buildx.outputs.platforms }}"

      - name: Login and Build Docker Image And Push
        shell: bash
        env:
          ALL_SECRETS: ${{ toJSON(secrets) }}
          BUILDX_NO_DEFAULT_ATTESTATIONS: 1
        run: |
          set -euo pipefail
          repos=()
          for key in $(echo "$ALL_SECRETS" | jq -r "keys[]"); do
            if [[ $key == $SECRET_REPO_PREFIX* ]]; then
              repo_key=$key
              char=$(echo "$repo_key" | sed "s/$SECRET_REPO_PREFIX//")
              username_key="${SECRET_USERNAME_PREFIX}${char}"
              password_key="${SECRET_PASSWORD_PREFIX}${char}"

              repo=$(echo "$ALL_SECRETS" | jq -r ".${repo_key}")
              username=$(echo "$ALL_SECRETS" | jq -r ".${username_key}")
              password=$(echo "$ALL_SECRETS" | jq -r ".${password_key}")

              if [[ "$username" == "null" || "$password" == "null" ]]; then
                echo "::error::Missing secret ${username_key} or ${password_key}"
                exit 1
              fi

              repos+=("$repo")

              # 如果 repo 不含域名（无 . 号），则说明是 docker hub 的镜像，登录时不需要指定 registry
              if [[ "$repo" != *"."* ]]; then
                  echo "$password" | docker login -u "$username" --password-stdin
              else
                  registry="${repo%%/*}"
                  echo "$password" | docker login -u "$username" --password-stdin "$registry"
              fi
            fi
          done

          if [[ ${#repos[@]} -eq 0 ]]; then
            echo "::error::No REPO_* secrets configured, nothing to push"
            exit 1
          fi

          tag_suffix="$(TZ=Asia/Shanghai date +%Y-%m-%d_%H-%M-%S)_$(git rev-parse --short HEAD)"
          # SWR 基础版无法解析 OCI manifest，必须关闭证明信息并强制使用 Docker media type。
          cmd=(
            docker buildx build
            --provenance=false
            --sbom=false
            --platform linux/amd64,linux/arm64
            --cache-from type=gha
            --cache-to type=gha,mode=max
            --output type=image,push=true,oci-mediatypes=false
          )
          for repo in "${repos[@]}"; do
              cmd+=(-t "${repo}:latest" -t "${repo}:${tag_suffix}")
          done
          cmd+=(.)
          "${cmd[@]}"
